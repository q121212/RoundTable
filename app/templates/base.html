<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}RoundTable{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/styles.css">
    <script defer src="/static/vendor/lucide.min.js"></script>
    <script defer src="/static/app.js"></script>
  </head>
  <body data-current-project-url="{{ current_project_url }}">
    <header class="topbar">
      <a class="brand" href="/" data-home-link><img class="brand-mark" src="/static/favicon.svg" alt="" width="22" height="22">RoundTable</a>
      <nav class="topnav">
        {% if user %}
          <a href="/projects" data-board-link data-icon="columns-3" data-i18n="nav.board">Board</a>
          <details class="app-menu">
            <summary class="ghost tiny" data-icon="menu" data-i18n="nav.menu">Menu</summary>
            <div class="menu-popover">
              <a href="/projects" data-icon="folder-kanban" data-i18n="nav.projects">Projects</a>
              <a href="/settings/mcp" data-icon="key-round">MCP</a>
              <a href="/settings/notifications" data-icon="bell" data-i18n="nav.notifications">Notifications</a>
              <a href="/integrations/github" data-icon="git-branch">GitHub</a>
              <form class="inline" method="post" action="/logout">
                <input type="hidden" name="csrf_token" value="{{ user.csrf_token }}">
                <button class="ghost" type="submit" data-icon="log-out" data-i18n="nav.logout">Log out</button>
              </form>
            </div>
          </details>
        {% endif %}
        <div class="quick-prefs" aria-label="Display settings">
          <button class="ghost tiny" type="button" data-icon="languages" data-lang-toggle aria-label="Switch language">EN</button>
          <span class="prefs-divider" aria-hidden="true"></span>
          <button class="ghost tiny icon-pref" type="button" data-icon="moon" data-theme-toggle aria-label="Switch theme"></button>
        </div>
      </nav>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
      <a class="footer-brand" href="/" data-home-link>
        <img class="footer-mark" src="/static/favicon.svg" alt="" width="18" height="18">
        <span>RoundTable</span>
      </a>
      <span class="muted" data-i18n="footer.tagline">A round table for your tickets.</span>
    </footer>
  </body>
</html>
